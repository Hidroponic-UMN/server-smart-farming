# mosquitto.conf

listener 1883
protocol mqtt
# Disable anonymous access
allow_anonymous false
# admin_lab:admin123
# esp32-1:rack1
# esp32-2:rack2
# esp32-3:rack3
# esp32-4:rack4
# esp32-5:rack5
# esp32-0:room0
password_file /mosquitto/config/passwd

# Connection Settings
max_connections 10

# Limit in bytes
message_size_limit 1024

# --- Persistence ---
persistence true
persistence_location /mosquitto/data/

# --- Logging Config ---
log_dest file /mosquitto/log/mosquitto.log
log_dest stdout

# Log types: error, warning, notice, information, subscribe, unsubscribe
log_type error
log_type warning
log_type notice
log_type information
connection_messages true
log_timestamp true